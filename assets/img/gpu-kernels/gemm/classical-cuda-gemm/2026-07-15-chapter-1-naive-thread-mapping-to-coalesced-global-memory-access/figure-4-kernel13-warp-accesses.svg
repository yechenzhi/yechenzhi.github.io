  </g>
  <text x="215" y="340" class="flow-arrow" text-anchor="middle" dominant-baseline="middle">→</text>
  <text x="620" y="340" class="operator" text-anchor="middle" dominant-baseline="middle">and</text>
  <text x="1080" y="340" class="flow-arrow" text-anchor="middle" dominant-baseline="middle">→</text>
  <text x="112.0" y="510" class="warp-note" text-anchor="middle" dominant-baseline="middle">x = 0, 1, …, 31</text>
  <rect x="220" y="540" width="360" height="56" rx="14" class="access-tag tag-a" />
  <text x="400.0" y="568" class="tag-label text-a" text-anchor="middle" dominant-baseline="middle">32 A elements at fixed k</text>
  <rect x="640" y="540" width="400" height="56" rx="14" class="access-tag tag-b" />
  <text x="840.0" y="568" class="tag-label text-b" text-anchor="middle" dominant-baseline="middle">all 32 threads load  B[k, n]</text>
  <rect x="1120" y="540" width="400" height="56" rx="14" class="access-tag tag-d" />
  <text x="1320.0" y="568" class="tag-label text-d" text-anchor="middle" dominant-baseline="middle">32 D elements at fixed n</text>
  <text x="800.0" y="635" class="matrix-shape" text-anchor="middle" dominant-baseline="middle">ℓ = 0, 1, …, 31</text>
</svg>
