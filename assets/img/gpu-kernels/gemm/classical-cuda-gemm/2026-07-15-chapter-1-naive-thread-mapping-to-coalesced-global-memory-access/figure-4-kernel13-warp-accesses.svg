    <rect x="430" y="280" width="60" height="60" class="matrix-cell" />
    <rect x="490" y="280" width="60" height="60" class="matrix-cell" />
    <rect x="250" y="340" width="60" height="60" class="matrix-cell omitted-matrix-cell" />
    <text x="280.0" y="370.0" class="matrix-ellipsis" text-anchor="middle" dominant-baseline="middle">⋮</text>
    <rect x="310" y="340" width="60" height="60" class="matrix-cell omitted-matrix-cell" />
    <text x="340.0" y="370.0" class="matrix-ellipsis" text-anchor="middle" dominant-baseline="middle">⋮</text>
    <rect x="370" y="340" width="60" height="60" class="matrix-cell omitted-matrix-cell highlight-a" />
    <text x="400.0" y="370.0" class="matrix-ellipsis text-a" text-anchor="middle" dominant-baseline="middle">⋮</text>
    <rect x="430" y="340" width="60" height="60" class="matrix-cell omitted-matrix-cell" />
    <text x="460.0" y="370.0" class="matrix-ellipsis" text-anchor="middle" dominant-baseline="middle">⋮</text>
    <rect x="490" y="340" width="60" height="60" class="matrix-cell omitted-matrix-cell" />
    <text x="520.0" y="370.0" class="matrix-ellipsis" text-anchor="middle" dominant-baseline="middle">⋮</text>
    <rect x="250" y="400" width="60" height="60" class="matrix-cell" />
    <rect x="310" y="400" width="60" height="60" class="matrix-cell" />
    <rect x="370" y="400" width="60" height="60" class="matrix-cell highlight-a" />
    <rect x="430" y="400" width="60" height="60" class="matrix-cell" />
    <rect x="490" y="400" width="60" height="60" class="matrix-cell" />
    <rect x="250" y="220" width="300" height="240" class="matrix-outline" />
    <text x="400.0" y="200" class="index-label text-a" text-anchor="middle" dominant-baseline="middle">k</text>
  </g>
  <g id="matrix-b">
    <rect x="690" y="205" width="60" height="60" class="matrix-cell" />
    <rect x="750" y="205" width="60" height="60" class="matrix-cell" />
    <rect x="810" y="205" width="60" height="60" class="matrix-cell" />
    <rect x="870" y="205" width="60" height="60" class="matrix-cell" />
    <rect x="930" y="205" width="60" height="60" class="matrix-cell" />
    <rect x="690" y="265" width="60" height="60" class="matrix-cell" />
    <rect x="750" y="265" width="60" height="60" class="matrix-cell" />
    <rect x="810" y="265" width="60" height="60" class="matrix-cell" />
    <rect x="870" y="265" width="60" height="60" class="matrix-cell" />
    <rect x="930" y="265" width="60" height="60" class="matrix-cell" />
    <rect x="690" y="325" width="60" height="60" class="matrix-cell" />
    <rect x="750" y="325" width="60" height="60" class="matrix-cell" />
    <rect x="810" y="325" width="60" height="60" class="matrix-cell highlight-b" />
    <rect x="870" y="325" width="60" height="60" class="matrix-cell" />
    <rect x="930" y="325" width="60" height="60" class="matrix-cell" />
    <rect x="690" y="385" width="60" height="60" class="matrix-cell" />
    <rect x="750" y="385" width="60" height="60" class="matrix-cell" />
    <rect x="810" y="385" width="60" height="60" class="matrix-cell" />
    <rect x="870" y="385" width="60" height="60" class="matrix-cell" />
    <rect x="930" y="385" width="60" height="60" class="matrix-cell" />
    <rect x="690" y="445" width="60" height="60" class="matrix-cell" />
    <rect x="750" y="445" width="60" height="60" class="matrix-cell" />
    <rect x="810" y="445" width="60" height="60" class="matrix-cell" />
    <rect x="870" y="445" width="60" height="60" class="matrix-cell" />
    <rect x="930" y="445" width="60" height="60" class="matrix-cell" />
    <rect x="690" y="205" width="300" height="300" class="matrix-outline" />
    <text x="840.0" y="185" class="index-label text-b" text-anchor="middle" dominant-baseline="middle">n</text>
    <text x="672" y="355.0" class="index-label text-b" text-anchor="end" dominant-baseline="middle">k</text>
    <text x="840.0" y="355.0" class="same-element-label" text-anchor="middle" dominant-baseline="middle">×32</text>
  </g>
  <g id="matrix-d">
    <rect x="1170" y="220" width="60" height="60" class="matrix-cell" />
    <rect x="1230" y="220" width="60" height="60" class="matrix-cell" />
    <rect x="1290" y="220" width="60" height="60" class="matrix-cell highlight-d" />
    <rect x="1350" y="220" width="60" height="60" class="matrix-cell" />
    <rect x="1410" y="220" width="60" height="60" class="matrix-cell" />
    <rect x="1170" y="280" width="60" height="60" class="matrix-cell" />
    <rect x="1230" y="280" width="60" height="60" class="matrix-cell" />
    <rect x="1290" y="280" width="60" height="60" class="matrix-cell highlight-d" />
    <rect x="1350" y="280" width="60" height="60" class="matrix-cell" />
    <rect x="1410" y="280" width="60" height="60" class="matrix-cell" />
    <rect x="1170" y="340" width="60" height="60" class="matrix-cell omitted-matrix-cell" />
    <text x="1200.0" y="370.0" class="matrix-ellipsis" text-anchor="middle" dominant-baseline="middle">⋮</text>
    <rect x="1230" y="340" width="60" height="60" class="matrix-cell omitted-matrix-cell" />
    <text x="1260.0" y="370.0" class="matrix-ellipsis" text-anchor="middle" dominant-baseline="middle">⋮</text>
    <rect x="1290" y="340" width="60" height="60" class="matrix-cell omitted-matrix-cell highlight-d" />
    <text x="1320.0" y="370.0" class="matrix-ellipsis text-d" text-anchor="middle" dominant-baseline="middle">⋮</text>
    <rect x="1350" y="340" width="60" height="60" class="matrix-cell omitted-matrix-cell" />
    <text x="1380.0" y="370.0" class="matrix-ellipsis" text-anchor="middle" dominant-baseline="middle">⋮</text>
    <rect x="1410" y="340" width="60" height="60" class="matrix-cell omitted-matrix-cell" />
    <text x="1440.0" y="370.0" class="matrix-ellipsis" text-anchor="middle" dominant-baseline="middle">⋮</text>
    <rect x="1170" y="400" width="60" height="60" class="matrix-cell" />
    <rect x="1230" y="400" width="60" height="60" class="matrix-cell" />
    <rect x="1290" y="400" width="60" height="60" class="matrix-cell highlight-d" />
