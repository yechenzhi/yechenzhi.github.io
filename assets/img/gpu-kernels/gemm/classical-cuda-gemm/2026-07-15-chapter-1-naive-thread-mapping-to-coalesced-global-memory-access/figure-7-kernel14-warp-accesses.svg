    <text x="232" y="365.0" class="index-label text-a" text-anchor="end" dominant-baseline="middle">m</text>
    <text x="400.0" y="365.0" class="same-element-label" text-anchor="middle" dominant-baseline="middle">×32</text>
  </g>
