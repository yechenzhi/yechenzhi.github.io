<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" width="800" height="350" role="img" aria-labelledby="figure-title figure-description">
  <title id="figure-title">Elements accessed by one warp in Kernel 14</title>
  <desc id="figure-description">The selected warp is represented by threads zero, one, omitted threads, and thread 31. Thread ell has coordinates x equal to ell and y equal to w. During one fixed k iteration, all 32 threads load the same element A m k, while they load 32 consecutive elements B k n through B k n plus 31. After all K iterations, they load the old values and store the updated values for 32 consecutive elements D m n through D m n plus 31.</desc>
  <defs>
    <style>
      :root {
        color-scheme: light dark;
        --background: #fafaf9;
        --text: #172033;
        --muted-text: #475569;
        --cell: #f1f5f9;
        --grid: #64748b;
        --a-accent: #0072b2;
        --a-fill: #d9eef9;
        --a-text: #005f94;
        --b-accent: #e69f00;
        --b-fill: #fff0c2;
        --b-text: #8a5f00;
        --d-accent: #cc79a7;
        --d-fill: #f7dceb;
        --d-text: #9d4778;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: #111827;
          --text: #f8fafc;
          --muted-text: #cbd5e1;
          --cell: #1f2937;
          --grid: #94a3b8;
          --a-fill: #123f59;
          --a-text: #67c7f4;
          --b-fill: #55400c;
          --b-text: #ffd166;
          --d-fill: #552f48;
          --d-text: #f0a8d0;
        }
      }

      text {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .background { fill: var(--background); }
      .phase-header { fill: var(--cell); stroke: var(--grid); stroke-width: 2; }
      .phase-label { font-size: 26px; font-weight: 750; fill: var(--text); }
      .matrix-name { font-size: 38px; font-weight: 760; }
      .matrix-shape { font-size: 24px; font-weight: 550; fill: var(--muted-text); }
      .text-a { fill: var(--a-text); }
      .text-b { fill: var(--b-text); }
      .text-d { fill: var(--d-text); }
      .matrix-cell { fill: var(--cell); stroke: var(--grid); stroke-width: 1.5; }
      .omitted-matrix-cell { stroke-dasharray: 5 5; }
      .matrix-outline { fill: none; stroke: var(--grid); stroke-width: 3; }
      .highlight-a { fill: var(--a-fill); stroke: var(--a-accent); stroke-width: 3; }
      .highlight-b { fill: var(--b-fill); stroke: var(--b-accent); stroke-width: 3; }
      .highlight-d { fill: var(--d-fill); stroke: var(--d-accent); stroke-width: 3; }
      .matrix-ellipsis { font-size: 31px; font-weight: 750; }
      .index-label { font-size: 25px; font-weight: 800; }
      .column-index { font-size: 17px; font-weight: 760; }
      .warp-cell { fill: var(--d-fill); stroke: var(--d-accent); stroke-width: 2; }
      .omitted-warp-cell { stroke-dasharray: 5 5; }
      .warp-outline { fill: none; stroke: var(--d-accent); stroke-width: 4; }
      .warp-thread {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 22px;
        font-weight: 750;
        fill: var(--d-text);
      }
      .warp-ellipsis { font-size: 32px; font-weight: 750; fill: var(--d-text); }
      .same-element-label { font-size: 24px; font-weight: 850; fill: var(--a-text); }
      .operator { font-size: 30px; font-weight: 720; fill: var(--muted-text); }
      .flow-arrow { font-size: 52px; font-weight: 500; fill: var(--muted-text); }
      .access-tag { stroke-width: 2.5; }
      .tag-a { fill: var(--a-fill); stroke: var(--a-accent); }
      .tag-b { fill: var(--b-fill); stroke: var(--b-accent); }
      .tag-d { fill: var(--d-fill); stroke: var(--d-accent); }
      .tag-label { font-size: 22px; font-weight: 700; }
      .thread-note { font-size: 23px; font-weight: 680; fill: var(--text); }
    </style>
  </defs>
  <rect x="0" y="0" width="1600" height="700" rx="24" class="background" />
  <rect x="205" y="34" width="845" height="54" rx="15" class="phase-header" />
  <text x="627.5" y="61" class="phase-label" text-anchor="middle" dominant-baseline="middle">one fixed k iteration</text>
  <rect x="1135" y="34" width="370" height="54" rx="15" class="phase-header" />
  <text x="1320.0" y="61" class="phase-label" text-anchor="middle" dominant-baseline="middle">after all K iterations</text>
  <text x="112.0" y="125" class="matrix-name text-d" text-anchor="middle" dominant-baseline="middle">one warp</text>
  <text x="112.0" y="163" class="matrix-shape" text-anchor="middle" dominant-baseline="middle">fixed threadIdx.y</text>
  <text x="400.0" y="125" class="matrix-name text-a" text-anchor="middle" dominant-baseline="middle">load A</text>
  <text x="400.0" y="163" class="matrix-shape" text-anchor="middle" dominant-baseline="middle">(M × K)</text>
  <text x="880.0" y="125" class="matrix-name text-b" text-anchor="middle" dominant-baseline="middle">load B</text>
  <text x="880.0" y="163" class="matrix-shape" text-anchor="middle" dominant-baseline="middle">(K × N)</text>
  <text x="1320.0" y="125" class="matrix-name text-d" text-anchor="middle" dominant-baseline="middle">load + store D</text>
  <text x="1320.0" y="163" class="matrix-shape" text-anchor="middle" dominant-baseline="middle">(M × N)</text>
  <g id="selected-warp">
    <rect x="42" y="250" width="140" height="60" class="warp-cell" />
    <text x="112.0" y="280.0" class="warp-thread" text-anchor="middle" dominant-baseline="middle">x = 0</text>
    <rect x="42" y="310" width="140" height="60" class="warp-cell" />
    <text x="112.0" y="340.0" class="warp-thread" text-anchor="middle" dominant-baseline="middle">x = 1</text>
    <rect x="42" y="370" width="140" height="60" class="warp-cell omitted-warp-cell" />
    <text x="112.0" y="400.0" class="warp-ellipsis" text-anchor="middle" dominant-baseline="middle">⋮</text>
    <rect x="42" y="430" width="140" height="60" class="warp-cell" />
    <text x="112.0" y="460.0" class="warp-thread" text-anchor="middle" dominant-baseline="middle">x = 31</text>
    <rect x="42" y="250" width="140" height="240" class="warp-outline" />
  </g>
